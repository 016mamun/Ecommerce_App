name: ecommerce_app
description: A production-ready e-commerce mobile app built with Flutter and Riverpod.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Image Loading & Caching
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Local Storage & Secure Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # UI Components
  smooth_page_indicator: ^1.1.0
  flutter_spinkit: ^5.2.1
  iconsax: ^0.0.8
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
